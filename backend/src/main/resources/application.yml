server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: gmall-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gmall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gmall.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: gmall-secret-key-2026-meituan-miniprogram
  expiration: 86400000
  header: Authorization
  prefix: Bearer 

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN
